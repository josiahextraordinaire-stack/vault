<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Josiah Vault</title>
<script src="https://apis.google.com/js/api.js"></script>
<style>
body{background:#0f0f12;color:white;font-family:sans-serif;text-align:center}
button{padding:10px;margin:5px;border-radius:8px;border:none;cursor:pointer}
#items img{width:80px;height:80px;object-fit:cover;border-radius:8px}
</style>
</head>
<body>

<h2>Josiah's Vault</h2>
<div id="status">Connecting...</div>

<button onclick="manualSave()">💾 Save Now</button>
<button onclick="logout()">Logout</button>

<br><br>

<input type="text" id="name" placeholder="Item name">
<input type="file" id="imageInput">
<br>
<button onclick="addItem()">Add Item</button>

<div id="items"></div>

<script>
const CLIENT_ID = "7602149776-mmmv3vjosb1nhbne3oqi00pkd3lenffb.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/drive.file";
const FILE_NAME = "vault_data.json";

let token = null;
let fileId = null;
let db = { items: [] };

function init() {
  gapi.load("client:auth2", async () => {
    await gapi.client.init({
      clientId: CLIENT_ID,
      scope: SCOPES
    });

    const auth = gapi.auth2.getAuthInstance();

    if (!auth.isSignedIn.get()) {
      await auth.signIn();
    }

    token = auth.currentUser.get().getAuthResponse().access_token;

    document.getElementById("status").innerText = "✅ Connected";

    await loadData();
    render();
  });
}

async function loadData() {
  const res = await fetch(
    "https://www.googleapis.com/drive/v3/files?q=name='" + FILE_NAME + "'",
    { headers: { Authorization: "Bearer " + token } }
  );

  const data = await res.json();

  if (data.files.length > 0) {
    fileId = data.files[0].id;

    const fileRes = await fetch(
      "https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media",
      { headers: { Authorization: "Bearer " + token } }
    );

    db = await fileRes.json();
  }
}

async function saveData() {
  document.getElementById("status").innerText = "Saving...";

  const boundary = "foo_bar";
  const body =
    "--" + boundary + "\r\n" +
    "Content-Type: application/json\r\n\r\n" +
    JSON.stringify({ name: FILE_NAME }) + "\r\n" +
    "--" + boundary + "\r\n" +
    "Content-Type: application/json\r\n\r\n" +
    JSON.stringify(db) + "\r\n" +
    "--" + boundary + "--";

  let url = "https://www.googleapis.com/upload/drive/v3/files";
  let method = "POST";

  if (fileId) {
    url += "/" + fileId;
    method = "PATCH";
  }

  await fetch(url + "?uploadType=multipart", {
    method: method,
    headers: {
      Authorization: "Bearer " + token,
      "Content-Type": "multipart/related; boundary=" + boundary
    },
    body: body
  });

  document.getElementById("status").innerText = "✅ Saved";
}

async function uploadImage(file) {
  const metadata = {
    name: file.name,
    mimeType: file.type
  };

  const boundary = "foo_bar";
  const body =
    "--" + boundary + "\r\n" +
    "Content-Type: application/json\r\n\r\n" +
    JSON.stringify(metadata) + "\r\n" +
    "--" + boundary + "\r\n" +
    "Content-Type: " + file.type + "\r\n\r\n";

  const blob = new Blob([body, file, "\r\n--" + boundary + "--"]);

  const res = await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token,
        "Content-Type": "multipart/related; boundary=" + boundary
      },
      body: blob
    }
  );

  const data = await res.json();

  // make public
  await fetch(
    "https://www.googleapis.com/drive/v3/files/" + data.id + "/permissions",
    {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        role: "reader",
        type: "anyone"
      })
    }
  );

  return "https://drive.google.com/thumbnail?id=" + data.id;
}

async function addItem() {
  const name = document.getElementById("name").value;
  const file = document.getElementById("imageInput").files[0];

  let imageUrl = "";

  if (file) {
    imageUrl = await uploadImage(file);
  }

  db.items.push({ name, image: imageUrl });

  render();
  saveData(); // auto-save
}

function render() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  db.items.forEach(i => {
    const div = document.createElement("div");
    div.innerHTML = `
      <p>${i.name}</p>
      ${i.image ? `<img src="${i.image}">` : ""}
    `;
    container.appendChild(div);
  });
}

function manualSave() {
  saveData();
}

function logout() {
  gapi.auth2.getAuthInstance().signOut();
  location.reload();
}

init();
</script>

</body>
</html>
