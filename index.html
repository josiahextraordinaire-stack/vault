<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Josiah Vault</title>

<!-- NEW Google Identity -->
<script src="https://accounts.google.com/gsi/client"></script>

<style>
body{background:#0f0f12;color:white;font-family:sans-serif;text-align:center}
button{padding:10px;margin:5px;border-radius:8px;border:none;cursor:pointer}
#items img{width:80px;height:80px;object-fit:cover;border-radius:8px}
</style>
</head>
<body>

<h2>Josiah's Vault</h2>

<div id="status">Not connected</div>

<button onclick="manualSave()">💾 Save</button>
<button onclick="logout()">Logout</button>

<br><br>

<input type="text" id="name" placeholder="Item name">
<input type="file" id="imageInput">
<br>
<button onclick="addItem()">Add Item</button>

<div id="items"></div>

<script>
const CLIENT_ID = "7602149776-mmmv3vjosb1nhbne3oqi00pkd3lenffb.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/drive.file";
const FILE_NAME = "vault_data.json";

let accessToken = null;
let fileId = null;
let db = { items: [] };

let tokenClient;

/* =========================
   AUTH (FIXED)
========================= */
function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (response) => {
      accessToken = response.access_token;
      document.getElementById("status").innerText = "✅ Connected";

      await loadData();
      render();
    }
  });

  // trigger login immediately
  tokenClient.requestAccessToken({ prompt: "consent" });
}

/* =========================
   LOAD DATA
========================= */
async function loadData() {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'`,
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  const data = await res.json();

  if (data.files.length > 0) {
    fileId = data.files[0].id;

    const fileRes = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      {
        headers: { Authorization: "Bearer " + accessToken }
      }
    );

    db = await fileRes.json();
  }
}

/* =========================
   SAVE DATA
========================= */
async function saveData() {
  document.getElementById("status").innerText = "Saving...";

  const boundary = "foo_bar";
  const body =
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
    JSON.stringify({ name: FILE_NAME }) +
    `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
    JSON.stringify(db) +
    `\r\n--${boundary}--`;

  let url = "https://www.googleapis.com/upload/drive/v3/files";
  let method = "POST";

  if (fileId) {
    url += "/" + fileId;
    method = "PATCH";
  }

  const res = await fetch(url + "?uploadType=multipart", {
    method,
    headers: {
      Authorization: "Bearer " + accessToken,
      "Content-Type": "multipart/related; boundary=" + boundary
    },
    body
  });

  const result = await res.json();
  fileId = result.id || fileId;

  document.getElementById("status").innerText = "✅ Saved";
}

/* =========================
   IMAGE UPLOAD
========================= */
async function uploadImage(file) {
  const metadata = {
    name: file.name,
    mimeType: file.type
  };

  const boundary = "foo_bar";
  const body =
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
    JSON.stringify(metadata) +
    `\r\n--${boundary}\r\nContent-Type: ${file.type}\r\n\r\n`;

  const blob = new Blob([body, file, `\r\n--${boundary}--`]);

  const res = await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method: "POST",
      headers: {
        Authorization: "Bearer " + accessToken,
        "Content-Type": "multipart/related; boundary=" + boundary
      },
      body: blob
    }
  );

  const data = await res.json();

  // MAKE PUBLIC
  await fetch(
    `https://www.googleapis.com/drive/v3/files/${data.id}/permissions`,
    {
      method: "POST",
      headers: {
        Authorization: "Bearer " + accessToken,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        role: "reader",
        type: "anyone"
      })
    }
  );

  return `https://drive.google.com/thumbnail?id=${data.id}`;
}

/* =========================
   ADD ITEM (AUTO SAVE)
========================= */
async function addItem() {
  const name = document.getElementById("name").value;
  const file = document.getElementById("imageInput").files[0];

  let image = "";

  if (file) {
    image = await uploadImage(file);
  }

  db.items.push({ name, image });

  render();
  saveData();
}

/* =========================
   UI RENDER
========================= */
function render() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  db.items.forEach(i => {
    const div = document.createElement("div");
    div.innerHTML = `
      <p>${i.name}</p>
      ${i.image ? `<img src="${i.image}">` : ""}
    `;
    container.appendChild(div);
  });
}

/* =========================
   MANUAL SAVE
========================= */
function manualSave() {
  saveData();
}

/* =========================
   LOGOUT
========================= */
function logout() {
  accessToken = null;
  document.getElementById("status").innerText = "Logged out";
}

/* =========================
   START
========================= */
initAuth();
</script>

</body>
</html>
