<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Josiah’s Vault (Drive Sync)</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root{
      --bg:#0f1115; --card:#171a21; --txt:#e9ecf1; --muted:#aab2c0;
      --accent:#7c5cff; --bad:#ff5c7a; --good:#2ee59d; --line:#2a2f3a;
      --btn:#23283a;
    }
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--txt);}
    header{padding:16px 16px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,17,21,.92);backdrop-filter: blur(8px);}
    h1{margin:0;font-size:18px;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    button{background:var(--btn);color:var(--txt);border:1px solid var(--line);padding:10px 12px;border-radius:10px;cursor:pointer}
    button.primary{background:var(--accent);border-color:transparent}
    button:disabled{opacity:.6;cursor:not-allowed}
    .pill{font-size:12px;padding:6px 10px;border:1px solid var(--line);border-radius:999px;color:var(--muted)}
    .pill.good{border-color:rgba(46,229,157,.35);color:var(--good)}
    .pill.bad{border-color:rgba(255,92,122,.35);color:var(--bad)}
    main{padding:16px;max-width:980px;margin:0 auto}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
    .muted{color:var(--muted);font-size:13px}
    .item-title{font-weight:650}
    img{max-width:100%;border-radius:12px;border:1px solid var(--line);margin-top:10px}
    dialog{border:none;border-radius:16px;padding:0;background:var(--card);color:var(--txt);width:min(560px,92vw)}
    dialog::backdrop{background:rgba(0,0,0,.55)}
    .dlg-h{padding:14px 14px 10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .dlg-b{padding:14px}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
    input,textarea{width:100%;box-sizing:border-box;background:#0f1115;color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:10px}
    textarea{min-height:90px;resize:vertical}
    .dlg-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
    .small{font-size:12px}
    code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px}
  </style>
</head>

<body>
<header>
  <h1>Josiah’s Vault</h1>
  <div class="row">
    <button id="btnSignIn" class="primary">Sign in to Google</button>
    <button id="btnSync" disabled>Sync now</button>
    <button id="btnAdd" disabled>Add item</button>
    <span id="syncPill" class="pill">Not signed in</span>
  </div>
  <div class="row">
    <span class="pill"><span class="muted">Data file:</span> <code>vault_data.json</code></span>
    <span class="pill"><span class="muted">Images folder:</span> <code>Vault Images</code></span>
  </div>
</header>

<main>
  <p class="muted">
    This version stores inventory in Google Drive and uploads photos as separate Drive files.
    Open on any device, sign in, and it stays up to date.
  </p>

  <div id="list" class="grid"></div>

  <p id="empty" class="muted" style="display:none">No items yet. Click “Add item”.</p>
</main>

<dialog id="dlg">
  <div class="dlg-h">
    <div style="font-weight:650">Add item</div>
    <button id="btnClose">Close</button>
  </div>
  <div class="dlg-b">
    <label>Name</label>
    <input id="inName" placeholder="Disappearing cane" />

    <label>Notes</label>
    <textarea id="inNotes" placeholder="Where it lives, what it is, etc."></textarea>

    <label>Photo (optional)</label>
    <input id="inPhoto" type="file" accept="image/*" />

    <div class="dlg-actions">
      <button id="btnSave" class="primary">Save</button>
    </div>

    <p class="muted small" id="dlgStatus" style="margin-top:10px"></p>
  </div>
</dialog>

<script>
/* ========= CONFIG ========= */
var GCLIENT_ID = '7602149776-mmmv3vjosb1nhbne3oqi00pkd3lenffb.apps.googleusercontent.com';
var SCOPES = 'https://www.googleapis.com/auth/drive.file';
var VAULT_FILENAME = 'vault_data.json';
var VAULT_IMAGES_FOLDER_NAME = 'Vault Images';

/* ========= STATE ========= */
var STATE = { version: 1, updatedAt: null, items: [] };

var gToken = null, gTokenExpiry = 0;
var gDriveFileId = null;
var gImagesFolderId = null;
var gTokenClient = null;

/* ========= UI ========= */
var btnSignIn = document.getElementById('btnSignIn');
var btnSync = document.getElementById('btnSync');
var btnAdd = document.getElementById('btnAdd');
var syncPill = document.getElementById('syncPill');

var list = document.getElementById('list');
var empty = document.getElementById('empty');

var dlg = document.getElementById('dlg');
var btnClose = document.getElementById('btnClose');
var btnSave = document.getElementById('btnSave');
var inName = document.getElementById('inName');
var inNotes = document.getElementById('inNotes');
var inPhoto = document.getElementById('inPhoto');
var dlgStatus = document.getElementById('dlgStatus');

function setPill(text, kind){
  syncPill.textContent = text;
  syncPill.className = 'pill' + (kind ? (' ' + kind) : '');
}

function render(){
  list.innerHTML = '';
  if(!STATE.items || STATE.items.length === 0){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  STATE.items.slice().reverse().forEach(function(it){
    var card = document.createElement('div');
    card.className = 'card';

    var title = document.createElement('div');
    title.className = 'item-title';
    title.textContent = it.name || '(unnamed item)';
    card.appendChild(title);

    if(it.notes){
      var notes = document.createElement('div');
      notes.className = 'muted';
      notes.style.marginTop = '6px';
      notes.textContent = it.notes;
      card.appendChild(notes);
    }

    var meta = document.createElement('div');
    meta.className = 'muted small';
    meta.style.marginTop = '10px';
    meta.textContent = it.updatedAt ? ('Updated: ' + new Date(it.updatedAt).toLocaleString()) : '';
    card.appendChild(meta);

    if(it.imageFileId){
      var img = document.createElement('img');
      img.alt = it.name || 'Item image';
      img.src = driveImageUrl(it.imageFileId);
      // token is required; browser will send request without auth header, so we must fetch+blob
      // We'll lazy-load via authenticated fetch:
      loadDriveImageInto(img, it.imageFileId);
      card.appendChild(img);
    }

    list.appendChild(card);
  });
}

async function loadDriveImageInto(imgEl, fileId){
  try{
    if(!isTokenValid()) return;
    var r = await driveFetch(`https://www.googleapis.com/drive/v3/files/\${fileId}?alt=media`);
    if(!r.ok) return;
    var blob = await r.blob();
    imgEl.src = URL.createObjectURL(blob);
  }catch(e){}
}

/* ========= AUTH ========= */
function isTokenValid() {
  return gToken && Date.now() < (gTokenExpiry - 60_000);
}

function ensureTokenClient() {
  if (gTokenClient) return gTokenClient;
  if (!window.google || !google.accounts || !google.accounts.oauth2) {
    throw new Error('Google Identity Services not loaded yet.');
  }
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GCLIENT_ID,
    scope: SCOPES,
    callback: function(resp) {}
  });
  return gTokenClient;
}

function signInGoogle(cb) {
  if (isTokenValid()) return cb(gToken);

  var client;
  try { client = ensureTokenClient(); }
  catch (e) { return cb(null, e); }

  client.callback = function(resp) {
    if (!resp || resp.error) return cb(null, new Error(resp && resp.error ? resp.error : 'Sign-in failed'));
    gToken = resp.access_token;
    gTokenExpiry = Date.now() + (resp.expires_in * 1000);
    cb(gToken);
  };

  client.requestAccessToken({ prompt: 'consent' }); // use consent to avoid silent weirdness on iOS
}

/* ========= DRIVE HELPERS ========= */
function driveFetch(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = 'Bearer ' + gToken;
  return fetch(url, opts);
}

async function ensureVaultDataFile() {
  if (gDriveFileId) return gDriveFileId;

  var q = `name='\${VAULT_FILENAME.replace(/'/g, "\\'")}' and trashed=false`;
  var url = 'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=files(id,name)';
  var r = await driveFetch(url);
  var data = await r.json();

  if (data.files && data.files[0]) {
    gDriveFileId = data.files[0].id;
    return gDriveFileId;
  }

  var cr = await driveFetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: VAULT_FILENAME, mimeType: 'application/json' })
  });
  var f = await cr.json();
  gDriveFileId = f.id;
  return gDriveFileId;
}

async function ensureImagesFolder() {
  if (gImagesFolderId) return gImagesFolderId;

  var q = `name='\${VAULT_IMAGES_FOLDER_NAME.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  var url = 'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=files(id,name)';
  var r = await driveFetch(url);
  var data = await r.json();

  if (data.files && data.files[0]) {
    gImagesFolderId = data.files[0].id;
    return gImagesFolderId;
  }

  var cr = await driveFetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: VAULT_IMAGES_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  var folder = await cr.json();
  gImagesFolderId = folder.id;
  return gImagesFolderId;
}

async function loadVaultFromDrive() {
  await ensureVaultDataFile();
  var r = await driveFetch(`https://www.googleapis.com/drive/v3/files/\${gDriveFileId}?alt=media`);
  if (!r.ok) return null;
  var text = await r.text();
  if (!text || !text.trim()) return null;
  return JSON.parse(text);
}

async function saveVaultToDrive(vaultObj) {
  await ensureVaultDataFile();
  vaultObj.updatedAt = new Date().toISOString();

  var body = JSON.stringify(vaultObj);
  var r = await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/\${gDriveFileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json; charset=UTF-8' },
    body
  });
  if (!r.ok) throw new Error('Failed to save vault_data.json to Drive');
  return true;
}

async function uploadImageToDrive(file) {
  await ensureImagesFolder();

  var metadata = { name: (file.name || ('vault_image_' + Date.now() + '.jpg')), parents: [gImagesFolderId] };
  var boundary = '-------vaultboundary' + Math.random().toString(16).slice(2);
  var delimiter = '\r\n--' + boundary + '\r\n';
  var closeDelim = '\r\n--' + boundary + '--';

  var fileBytes = await file.arrayBuffer();
  var multipartBody =
    delimiter +
    'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
    JSON.stringify(metadata) +
    delimiter +
    'Content-Type: ' + (file.type || 'application/octet-stream') + '\r\n\r\n';

  var blob = new Blob([multipartBody, fileBytes, closeDelim], { type: 'multipart/related; boundary=' + boundary });

  var r = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
    method: 'POST',
    headers: { 'Content-Type': 'multipart/related; boundary=' + boundary },
    body: blob
  });

  var data = await r.json();
  if (!r.ok || !data.id) throw new Error('Image upload failed: ' + JSON.stringify(data));
  return data; // {id,name}
}

function driveImageUrl(fileId) {
  return `https://www.googleapis.com/drive/v3/files/\${fileId}?alt=media`;
}

/* ========= ACTIONS ========= */
async function doSync(){
  setPill('Syncing…', '');
  try{
    var remote = await loadVaultFromDrive();
    if(remote && remote.items){
      STATE = remote;
    }
    render();
    setPill('Synced', 'good');
  }catch(e){
    console.error(e);
    setPill('Sync failed', 'bad');
  }
}

btnSignIn.onclick = function(){
  setPill('Signing in…', '');
  signInGoogle(async function(token, err){
    if(err){
      console.error(err);
      setPill('Sign-in failed', 'bad');
      return;
    }
    btnSync.disabled = false;
    btnAdd.disabled = false;
    setPill('Signed in', 'good');
    await doSync();
  });
};

btnSync.onclick = function(){
  signInGoogle(async function(token, err){
    if(err){ setPill('Sign-in failed', 'bad'); return; }
    await doSync();
  });
};

btnAdd.onclick = function(){
  inName.value = '';
  inNotes.value = '';
  inPhoto.value = '';
  dlgStatus.textContent = '';
  dlg.showModal();
};

btnClose.onclick = function(){ dlg.close(); };

btnSave.onclick = function(){
  dlgStatus.textContent = 'Saving…';
  signInGoogle(async function(token, err){
    if(err){
      dlgStatus.textContent = 'Sign-in failed: ' + err.message;
      return;
    }
    try{
      var item = {
        id: 'it_' + Math.random().toString(16).slice(2) + '_' + Date.now(),
        name: inName.value.trim(),
        notes: inNotes.value.trim(),
        imageFileId: null,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      var file = inPhoto.files && inPhoto.files[0] ? inPhoto.files[0] : null;
      if(file){
        dlgStatus.textContent = 'Uploading image…';
        var uploaded = await uploadImageToDrive(file);
        item.imageFileId = uploaded.id;
      }

      STATE.items = STATE.items || [];
      STATE.items.push(item);

      dlgStatus.textContent = 'Saving to Drive…';
      await saveVaultToDrive(STATE);

      dlg.close();
      render();
      setPill('Synced', 'good');
    }catch(e){
      console.error(e);
      dlgStatus.textContent = 'Error: ' + e.message;
      setPill('Save failed', 'bad');
    }
  });
};

/* Initial render */
render();
</script>
</body>
</
